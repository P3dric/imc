<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMC — Calculadora</title>
  <!-- Fontes: Space Grotesk (display) + Inter (dados) -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="shell">

    <!-- Cabeçalho mínimo -->
    <header class="header">
      <span class="header-marca">IMC</span>
      <span class="header-sub">Body Mass Index</span>
    </header>

    <!-- Formulário de entrada -->
    <section class="form-section">

      <div class="inputs-row">

        <div class="field">
          <label class="field-label" for="peso">Peso</label>
          <div class="input-wrap">
            <input class="field-input" type="number" id="peso"
                   placeholder="70" min="1" max="300" step="0.1" />
            <span class="unit">kg</span>
          </div>
        </div>

        <div class="field-divider" aria-hidden="true">/</div>

        <div class="field">
          <label class="field-label" for="altura">Altura</label>
          <div class="input-wrap">
            <input class="field-input" type="number" id="altura"
                   placeholder="175" min="50" max="250" step="1" />
            <span class="unit">cm</span>
          </div>
        </div>

      </div>

      <button class="btn-calcular" onclick="calcular()">
        Calcular
        <span class="btn-arrow" aria-hidden="true">→</span>
      </button>

    </section>

    <!-- Resultado — oculto até o cálculo -->
    <section class="resultado" id="resultado" aria-live="polite">

      <!-- Número gigante do IMC — o "placar" -->
      <div class="imc-placar">
        <span class="imc-numero" id="imc-val">—</span>
        <span class="imc-unidade">kg/m²</span>
      </div>

      <!-- Badge de classificação -->
      <div class="classificacao-wrap">
        <span class="classificacao-badge" id="imc-badge"></span>
      </div>

      <!-- Barra de espectro -->
      <div class="espectro">
        <div class="espectro-track">
          <div class="espectro-fill" id="imc-bar"></div>
          <!-- Marcador ponteiro -->
          <div class="espectro-pointer" id="imc-pointer"></div>
        </div>
        <div class="espectro-labels">
          <span>Baixo</span>
          <span>Normal</span>
          <span>Sobre</span>
          <span>Obeso</span>
        </div>
      </div>

      <!-- Tabela de referência compacta -->
      <div class="referencia">
        <div class="ref-titulo">Tabela de referência</div>
        <div class="ref-grid">
          <div class="ref-linha" data-faixa="baixo">
            <div class="ref-cor"></div>
            <span class="ref-nome">Abaixo do peso</span>
            <span class="ref-range">&lt; 18,5</span>
          </div>
          <div class="ref-linha" data-faixa="normal">
            <div class="ref-cor"></div>
            <span class="ref-nome">Peso normal</span>
            <span class="ref-range">18,5 – 24,9</span>
          </div>
          <div class="ref-linha" data-faixa="sobre">
            <div class="ref-cor"></div>
            <span class="ref-nome">Sobrepeso</span>
            <span class="ref-range">25,0 – 29,9</span>
          </div>
          <div class="ref-linha" data-faixa="ob1">
            <div class="ref-cor"></div>
            <span class="ref-nome">Obesidade grau I</span>
            <span class="ref-range">30,0 – 34,9</span>
          </div>
          <div class="ref-linha" data-faixa="ob2">
            <div class="ref-cor"></div>
            <span class="ref-nome">Obesidade grau II</span>
            <span class="ref-range">35,0 – 39,9</span>
          </div>
          <div class="ref-linha" data-faixa="ob3">
            <div class="ref-cor"></div>
            <span class="ref-nome">Obesidade grau III</span>
            <span class="ref-range">&ge; 40,0</span>
          </div>
        </div>
      </div>

    </section>

    <footer class="footer">
      Classificação OMS · uso profissional e pessoal
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
