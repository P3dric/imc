<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de IMC</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="card">

    <div class="card-head">
      <h1>Calculadora de IMC</h1>
      <p>Índice de Massa Corporal — classificação OMS</p>
    </div>

    <div class="card-body">

      <div class="row-2">
        <div class="field">
          <label>Peso (kg)</label>
          <input type="number" id="peso" placeholder="70" min="1" max="500" step="0.1" />
        </div>
        <div class="field">
          <label>Altura (cm)</label>
          <input type="number" id="altura" placeholder="170" min="50" max="250" step="1" />
        </div>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Sexo biológico</label>
          <div class="toggle-group">
            <button class="toggle-btn active" id="btn-m" onclick="setSexo('M')">Masculino</button>
            <button class="toggle-btn"        id="btn-f" onclick="setSexo('F')">Feminino</button>
          </div>
        </div>
        <div class="field">
          <label>Idade (anos)</label>
          <input type="number" id="idade" placeholder="30" min="2" max="120" step="1" />
        </div>
      </div>

      <p class="error-msg" id="erro">Preencha todos os campos corretamente.</p>

      <button class="btn-calc" onclick="calcular()">Calcular IMC</button>

      <div id="resultado">
        <br />
        <div class="divider"></div>

        <div class="imc-display">
          <span class="imc-num" id="imc-num">--</span>
          <span class="imc-unit">kg/m²</span>
        </div>

        <div class="imc-label" id="imc-label">--</div>

        <span class="pill" id="imc-pill">--</span>

        <div class="bar-wrap">
          <div class="bar-track">
            <div class="bar-thumb" id="bar-thumb" style="left:0%"></div>
          </div>
          <div class="bar-labels">
            <span>14</span><span>18,5</span><span>25</span><span>30</span><span>35</span><span>40+</span>
          </div>
        </div>

        <div class="metrics">

          <div class="metric">
            <div class="metric-label">Peso ideal</div>
            <div class="metric-val" id="m-ideal">--</div>
            <div class="metric-sub">IMC 22 kg/m²</div>
          </div>

          <div class="metric">
            <div class="metric-label">Faixa saudável</div>
            <div class="metric-val" id="m-faixa">--</div>
            <div class="metric-sub">18,5 – 24,9</div>
          </div>

          <div class="metric">
            <div class="metric-label">Diferença</div>
            <div class="metric-val" id="m-diff">--</div>
            <div class="metric-sub">do peso ideal</div>
          </div>

          <div class="metric">
            <div class="metric-label">Metabolismo basal</div>
            <div class="metric-val" id="m-tmb">--</div>
            <div class="metric-sub">kcal/dia em repouso</div>
          </div>

        </div>

        <div class="ref-title">Tabela de referência OMS</div>
        <table class="ref-table" id="ref-table">
          <tbody></tbody>
        </table>

      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
